name: PDF処理アクション（完全自動）

on:
  # 🧪 手動実行
  workflow_dispatch:

  # ✅ 本番（6時間おき：JST 0 / 6 / 12 / 18 時）
  schedule:
    - cron: '0 15,21,3,9 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pymupdf gspread google-api-python-client

      - name: Run main.py
        run: python main.py
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
