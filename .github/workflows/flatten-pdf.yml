name: PDF処理アクション（完全自動）

on:
  # 🧪 手動実行
  workflow_dispatch:

  # ✅ 本番（JST 5:10 / 12:10 / 16:00 / 21:10）
  schedule:
    - cron: '10 20 * * *'  # JST 5:10
    - cron: '10 3 * * *'   # JST 12:10
    - cron: '0 7 * * *'    # JST 16:00
    - cron: '10 12 * * *'  # JST 21:10

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pymupdf gspread google-api-python-client

      - name: Run main.py
        run: python main.py
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
``
