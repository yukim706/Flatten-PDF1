name: PDF処理アクション（完全自動）

on:
  # 🧪 テスト（5分おき）
  schedule:
  # - cron: '*/5 * * * *'

  # ✅ 本番（6時間おき：12/18/0/6時 JST）
    - cron: '0 3/6 * * *'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pymupdf gspread google-api-python-client

      - run: python main.py
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
